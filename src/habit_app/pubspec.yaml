name: habit_app
description: "HabitFlow — a simple offline-first daily habit tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local NoSQL persistence (works offline, no SQL).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management.
  provider: ^6.1.2

  # Charts on the stats screen.
  fl_chart: ^0.69.0

  # Date formatting helpers.
  intl: ^0.19.0

  # Unique IDs for habits.
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
